<!DOCTYPE html>
<html>
<head>
    <title>Student Result System</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #f2f2f2; }
        input { padding: 8px; margin: 5px; }
        table { border-collapse: collapse; margin-top: 20px; width: 100%; }
        th, td { border: 1px solid black; padding: 8px; text-align: center; }
        th { background: #ddd; }
        button { padding: 8px 15px; }
    </style>
</head>
<body>

<h2>Student Result Management System</h2>

<form method="POST">
    <input type="number" name="roll" placeholder="Roll No" required>
    <input type="text" name="name" placeholder="Name" required>
    <input type="number" name="maths" placeholder="Maths" required>
    <input type="number" name="science" placeholder="Science" required>
    <input type="number" name="english" placeholder="English" required>
    <button type="submit">Add Result</button>
</form>

<table>
    <tr>
        <th>Roll</th>
        <th>Name</th>
        <th>Maths</th>
        <th>Science</th>
        <th>English</th>
        <th>Total</th>
        <th>Percent</th>
        <th>Grade</th>
    </tr>

    {% for s in students %}
    <tr>
        <td>{{ s[0] }}</td>
        <td>{{ s[1] }}</td>
        <td>{{ s[2] }}</td>
        <td>{{ s[3] }}</td>
        <td>{{ s[4] }}</td>
        <td>{{ s[5] }}</td>
        <td>{{ s[6] }}</td>
        <td>{{ s[7] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
