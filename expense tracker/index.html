<!DOCTYPE html>
<html lang="en">
<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Expense Tracker</h1>

    <div class="container">
        <h3>Balance: ₹<span id="balance">0</span></h3>

        <div>
            <h4>Income: ₹<span id="income">0</span></h4>
            <h4>Expense: ₹<span id="expense">0</span></h4>
        </div>

        <h3>Add Transaction</h3>

        <input type="text" id="text" placeholder="Enter description">
        <input type="number" id="amount" placeholder="Enter amount (+income, -expense)">
        <button onclick="addTransaction()">Add</button>

        <h3>History</h3>
        <ul id="list"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
