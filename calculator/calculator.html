<!DOCTYPE html>
<html>
<head>
    <title>Scientific Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1e1e1e;
            font-family: Arial;
        }
        .calculator {
            background: #2c2c2c;
            padding: 20px;
            border-radius: 10px;
        }
        input {
            width: 100%;
            height: 60px;
            font-size: 22px;
            margin-bottom: 10px;
            text-align: right;
            padding: 5px;
        }
        button {
            width: 65px;
            height: 50px;
            margin: 4px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn { background: #444; color: white; }
        .op { background: orange; color: white; }
        .equal { background: green; color: white; width: 140px; }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled>

    <div>
        <button class="btn" onclick="clearDisplay()">C</button>
        <button class="btn" onclick="deleteLast()">⌫</button>
        <button class="op" onclick="append('/')">/</button>
        <button class="op" onclick="append('*')">*</button>
    </div>

    <div>
        <button class="btn" onclick="append('Math.sin(')">sin</button>
        <button class="btn" onclick="append('Math.cos(')">cos</button>
        <button class="btn" onclick="append('Math.tan(')">tan</button>
        <button class="op" onclick="append('-')">-</button>
    </div>

    <div>
        <button class="btn" onclick="append('Math.log10(')">log</button>
        <button class="btn" onclick="append('Math.sqrt(')">√</button>
        <button class="btn" onclick="append('**')">^</button>
        <button class="op" onclick="append('+')">+</button>
    </div>

    <div>
        <button class="btn" onclick="append('7')">7</button>
        <button class="btn" onclick="append('8')">8</button>
        <button class="btn" onclick="append('9')">9</button>
    </div>

    <div>
        <button class="btn" onclick="append('4')">4</button>
        <button class="btn" onclick="append('5')">5</button>
        <button class="btn" onclick="append('6')">6</button>
    </div>

    <div>
        <button class="btn" onclick="append('1')">1</button>
        <button class="btn" onclick="append('2')">2</button>
        <button class="btn" onclick="append('3')">3</button>
    </div>

    <div>
        <button class="btn" onclick="append('0')">0</button>
        <button class="btn" onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    function append(value) {
        document.getElementById("display").value += value;
    }

    function clearDisplay() {
        document.getElementById("display").value = "";
    }

    function deleteLast() {
        let current = document.getElementById("display").value;
        document.getElementById("display").value = current.slice(0, -1);
    }

    function calculate() {
        try {
            let result = eval(document.getElementById("display").value);
            document.getElementById("display").value = result;
        } catch {
            alert("Invalid Expression");
        }
    }
</script>

</body>
</html>
